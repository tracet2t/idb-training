services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: idb-training-dev
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0 --port 5173

  app-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: idb-training-prod
    ports:
      - "8080:80"
